<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Lịch Việt</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f5f0eb;--white:#fff;--card:#ffffff;
  --red:#c0392b;--red2:#e74c3c;--gold:#e67e22;--gold2:#f39c12;
  --dark:#1a1209;--text:#2c1810;--muted:#8c7b6e;--lunar:#c0392b;
  --green:#27ae60;--blue:#2980b9;--border:#e8ddd4;
}
body{font-family:'Be Vietnam Pro',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:430px;margin:0 auto;padding-bottom:80px}
/* STATUS BAR AREA */
.safe-top{height:env(safe-area-inset-top,44px)}

/* HEADER */
.header{background:var(--white);padding:12px 16px 8px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.nav-btn{width:36px;height:36px;border:none;background:none;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:.15s}
.nav-btn:active{background:rgba(0,0,0,.08)}
.header-center{text-align:center}
.header-month{font-family:'Noto Serif',serif;font-size:17px;font-weight:700;color:var(--dark)}
.header-year{font-size:12px;color:var(--muted)}
.today-btn{font-size:12px;font-weight:600;color:var(--red);border:1px solid var(--red);padding:4px 10px;border-radius:20px;background:none;cursor:pointer}

/* TODAY HERO */
.today-hero{background:linear-gradient(135deg,#c0392b 0%,#922b21 100%);margin:12px;border-radius:16px;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:relative;overflow:hidden;box-shadow:0 4px 20px rgba(192,57,43,.25)}
.today-hero::after{content:'🌙';position:absolute;right:-5px;top:-10px;font-size:70px;opacity:.1;transform:rotate(-20deg)}
.today-solar{font-family:'Noto Serif',serif;font-size:64px;font-weight:700;color:#fff;line-height:1}
.today-right{text-align:right}
.today-dow{font-size:11px;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-weight:600}
.today-lunar-big{font-family:'Noto Serif',serif;font-size:26px;font-weight:700;color:#ffd700}
.today-lunar-sub{font-size:12px;color:rgba(255,255,255,.65);margin-top:2px}
.today-canchi{font-size:11px;color:rgba(255,255,255,.55);margin-top:1px}

/* CALENDAR */
.cal-wrap{background:var(--white);margin:0 12px 12px;border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.dow-row{display:grid;grid-template-columns:repeat(7,1fr);padding:10px 8px 4px;border-bottom:1px solid var(--border)}
.dow-cell{text-align:center;font-size:11px;font-weight:700;color:var(--muted);padding:2px 0;letter-spacing:.3px}
.dow-cell:first-child{color:var(--red)}
.dow-cell:last-child{color:var(--blue)}
.days-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:4px 4px 10px;gap:1px}
.day-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;cursor:pointer;transition:.15s;position:relative;padding:1px}
.day-cell:active{opacity:.7}
.solar{font-size:15px;font-weight:600;line-height:1.2;color:var(--dark)}
.lunar{font-size:9px;font-weight:600;color:var(--red);line-height:1.2}
.day-cell.other .solar{color:#ccc}
.day-cell.other .lunar{color:#ddd}
.day-cell.sunday .solar{color:var(--red)}
.day-cell.saturday .solar{color:var(--blue)}
.day-cell.today{background:var(--red);box-shadow:0 3px 12px rgba(192,57,43,.35)}
.day-cell.today .solar{color:#fff!important}
.day-cell.today .lunar{color:rgba(255,255,220,.9)!important}
.day-cell.selected:not(.today){background:#fff3f0;border:1.5px solid var(--red)}
.special-dot{width:4px;height:4px;background:var(--gold);border-radius:50%;position:absolute;bottom:2px}
.new-month-label{font-size:8px;color:var(--gold);font-weight:700;line-height:1}

/* DETAIL */
.detail{background:var(--white);margin:0 12px 12px;border-radius:16px;padding:16px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.detail-header{font-family:'Noto Serif',serif;font-size:17px;font-weight:700;margin-bottom:12px;color:var(--dark)}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.detail-item{background:#faf7f4;border-radius:10px;padding:10px 12px;border:1px solid var(--border)}
.detail-label{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.detail-value{font-size:14px;font-weight:700;color:var(--dark)}
.detail-value.red{color:var(--red)}
.detail-value.gold{color:var(--gold)}
.detail-value.green{color:var(--green)}
.special-banner{background:linear-gradient(135deg,#fff8e1,#fff3cd);border:1px solid #ffe082;border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:13px;font-weight:600;color:#e65100}

/* AI XEM NGAY */
.ai-section{background:var(--white);margin:0 12px 12px;border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.ai-header{background:linear-gradient(135deg,#1a1209,#3d2b1f);padding:14px 16px;display:flex;align-items:center;gap:10px}
.ai-header-icon{font-size:22px}
.ai-header-text{color:#fff}
.ai-header-title{font-size:15px;font-weight:700}
.ai-header-sub{font-size:11px;color:rgba(255,255,255,.6)}
.ai-body{padding:14px 16px}
.ai-options{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.ai-opt-btn{padding:10px 8px;border:1.5px solid var(--border);border-radius:10px;background:#faf7f4;cursor:pointer;text-align:center;font-size:12px;font-weight:600;color:var(--text);transition:.15s;display:flex;flex-direction:column;align-items:center;gap:3px}
.ai-opt-btn:active{background:#fff0ed;border-color:var(--red)}
.ai-opt-btn.active{background:#fff0ed;border-color:var(--red);color:var(--red)}
.ai-opt-icon{font-size:18px}
.ai-custom{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-size:13px;font-family:inherit;background:#faf7f4;color:var(--dark);resize:none;margin-bottom:10px;outline:none}
.ai-custom:focus{border-color:var(--red)}
.ai-btn{width:100%;background:var(--red);color:#fff;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;transition:.15s}
.ai-btn:active{background:#922b21}
.ai-btn:disabled{background:#ccc;cursor:not-allowed}
.ai-result{background:#faf7f4;border-radius:10px;padding:14px;margin-top:12px;border:1px solid var(--border);font-size:13.5px;line-height:1.7;color:var(--dark);display:none;white-space:pre-wrap}
.ai-loading{text-align:center;padding:20px;color:var(--muted);display:none}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid #ddd;border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(255,255,255,.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 0 20px;z-index:100}
.bnav{display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 16px;cursor:pointer;opacity:.4;transition:.2s}
.bnav.active{opacity:1}
.bnav-icon{font-size:22px}
.bnav-label{font-size:10px;font-weight:600;color:var(--dark)}
.bnav.active .bnav-label{color:var(--red)}
.bnav-dot{width:4px;height:4px;border-radius:50%;background:transparent;margin-top:1px}
.bnav.active .bnav-dot{background:var(--red)}

/* FOOTER */
.footer{text-align:center;padding:16px;font-size:11px;color:var(--muted);line-height:1.6;border-top:1px solid var(--border);margin:0 12px}
.footer strong{color:var(--red);font-weight:700}
.footer a{color:var(--red);text-decoration:none}
</style>
</head>
<body>
<div class="safe-top"></div>

<div class="header">
  <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
  <div class="header-center">
    <div class="header-month" id="hMonth"></div>
    <div class="header-year" id="hYear"></div>
  </div>
  <button class="nav-btn" onclick="changeMonth(1)">›</button>
</div>

<div class="today-hero" onclick="goToday()">
  <div class="today-solar" id="tSolar"></div>
  <div class="today-right">
    <div class="today-dow" id="tDow"></div>
    <div class="today-lunar-big" id="tLunar"></div>
    <div class="today-lunar-sub" id="tLunarSub"></div>
    <div class="today-canchi" id="tCanChi"></div>
  </div>
</div>

<div class="cal-wrap">
  <div class="dow-row">
    <div class="dow-cell">CN</div><div class="dow-cell">T2</div><div class="dow-cell">T3</div>
    <div class="dow-cell">T4</div><div class="dow-cell">T5</div><div class="dow-cell">T6</div>
    <div class="dow-cell">T7</div>
  </div>
  <div class="days-grid" id="grid"></div>
</div>

<div class="detail" id="detail"></div>

<div class="ai-section">
  <div class="ai-header">
    <div class="ai-header-icon">🔮</div>
    <div class="ai-header-text">
      <div class="ai-header-title">Xem Ngày Giờ Tốt</div>
      <div class="ai-header-sub">Được tư vấn bởi AI</div>
    </div>
  </div>
  <div class="ai-body">
    <div class="ai-options">
      <button class="ai-opt-btn" onclick="selectOpt(this,'cưới hỏi')"><div class="ai-opt-icon">💍</div>Cưới hỏi</button>
      <button class="ai-opt-btn" onclick="selectOpt(this,'khai trương')"><div class="ai-opt-icon">🏪</div>Khai trương</button>
      <button class="ai-opt-btn" onclick="selectOpt(this,'khởi công xây dựng')"><div class="ai-opt-icon">🏗️</div>Khởi công</button>
      <button class="ai-opt-btn" onclick="selectOpt(this,'xuất hành đi xa')"><div class="ai-opt-icon">✈️</div>Xuất hành</button>
      <button class="ai-opt-btn" onclick="selectOpt(this,'ký hợp đồng')"><div class="ai-opt-icon">📝</div>Ký hợp đồng</button>
      <button class="ai-opt-btn" onclick="selectOpt(this,'nhập trạch dọn nhà')"><div class="ai-opt-icon">🏠</div>Nhập trạch</button>
    </div>
    <textarea class="ai-custom" id="aiQuestion" rows="2" placeholder="Hoặc gõ câu hỏi khác... (vd: ngày này có hợp để mở tài khoản?)"></textarea>
    <button class="ai-btn" id="aiBtn" onclick="askAI()">
      <span>✨</span> Xem ngày <span id="aiDateLabel"></span>
    </button>
    <div class="ai-loading" id="aiLoading"><div class="spinner"></div>Đang xem...</div>
    <div class="ai-result" id="aiResult"></div>
    <div id="historySection" style="display:none;margin-top:14px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Lịch sử hỏi đáp</div>
        <button onclick="clearHistory()" style="font-size:11px;color:var(--red);border:none;background:none;cursor:pointer;font-weight:600">Xóa tất cả</button>
      </div>
      <div id="historyList"></div>
    </div>
  </div>
</div>

<div class="footer">
  Phát triển bởi <strong>Trần Tiến</strong><br>
  📞 <a href="tel:0973141747">0973.141.747</a>
</div>

<div class="bottom-nav">
  <div class="bnav active" id="nav1"><div class="bnav-icon">📅</div><div class="bnav-label">Lịch</div><div class="bnav-dot"></div></div>
  <div class="bnav" id="nav2" onclick="scrollToAI()"><div class="bnav-icon">🔮</div><div class="bnav-label">Xem ngày</div><div class="bnav-dot"></div></div>
  <div class="bnav" id="nav3" onclick="goToday()"><div class="bnav-icon">☀️</div><div class="bnav-label">Hôm nay</div><div class="bnav-dot"></div></div>
</div>

function lunarDayStr(d){return d<=10?`Mùng ${d}`:String(d)}
function getSpecial(m,d){return SPECIAL[`${m}-${d}`]||null}

const today=new Date();
let vY=today.getFullYear(),vM=today.getMonth()+1;
let sel={y:today.getFullYear(),m:today.getMonth()+1,d:today.getDate()};
let aiOpt='';

function render(){
  // Header
  document.getElementById('hMonth').textContent=MONTHS[vM-1];
  document.getElementById('hYear').textContent=vY;
  // Today hero
  const l=getLunar(today.getFullYear(),today.getMonth()+1,today.getDate());
  document.getElementById('tSolar').textContent=today.getDate();
  document.getElementById('tDow').textContent=DOW[today.getDay()];
  document.getElementById('tLunar').textContent=lunarDayStr(l.day)+' / '+l.month;
  document.getElementById('tLunarSub').textContent='Âm lịch '+canChi(l.year);
  document.getElementById('tCanChi').textContent=`Tháng ${l.month} • Năm ${canChi(l.year)}`;
  renderGrid();
  renderDetail();
  updateAILabel();
}

function renderGrid(){
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  const first=new Date(vY,vM-1,1).getDay();
  const dim=new Date(vY,vM,0).getDate();
  const prevDim=new Date(vY,vM-1,0).getDate();
  // prev
  for(let i=first-1;i>=0;i--){
    const d=prevDim-i,pm=vM===1?12:vM-1,py=vM===1?vY-1:vY;
    addCell(grid,py,pm,d,true);
  }
  // current
  for(let d=1;d<=dim;d++) addCell(grid,vY,vM,d,false);
  // next
  const tot=first+dim,rem=tot%7===0?0:7-tot%7;
  for(let d=1;d<=rem;d++){
    const nm=vM===12?1:vM+1,ny=vM===12?vY+1:vY;
    addCell(grid,ny,nm,d,true);
  }
}

function addCell(g,y,m,d,other){
  const c=document.createElement('div');
  c.className='day-cell'+(other?' other':'');
  const dow=new Date(y,m-1,d).getDay();
  if(!other&&dow===0)c.classList.add('sunday');
  if(!other&&dow===6)c.classList.add('saturday');
  const isToday=y===today.getFullYear()&&m===today.getMonth()+1&&d===today.getDate();
  if(isToday)c.classList.add('today');
  if(sel.y===y&&sel.m===m&&sel.d===d&&!isToday)c.classList.add('selected');
  const l=getLunar(y,m,d);
  const sp=getSpecial(l.month,l.day);
  const sEl=document.createElement('div');sEl.className='solar';sEl.textContent=d;
  const lEl=document.createElement('div');lEl.className='lunar';
  if(l.day===1){lEl.textContent=`T.${l.month}`;lEl.style.color='#e67e22'}
  else{lEl.textContent=lunarDayStr(l.day)}
  c.appendChild(sEl);c.appendChild(lEl);
  if(sp&&!other){const dot=document.createElement('div');dot.className='special-dot';c.appendChild(dot);}
  c.onclick=()=>{sel={y,m,d};if(m!==vM){vY=y;vM=m;}// ===== HISTORY =====
function saveHistory(date, topic, answer){
  let h = JSON.parse(localStorage.getItem('lichviet_history')||'[]');
  h.unshift({date, topic, answer, time: new Date().toLocaleString('vi-VN')});
  if(h.length > 20) h = h.slice(0,20);
  localStorage.setItem('lichviet_history', JSON.stringify(h));
  renderHistory();
}
function renderHistory(){
  let h = JSON.parse(localStorage.getItem('lichviet_history')||'[]');
  const sec = document.getElementById('historySection');
  const list = document.getElementById('historyList');
  if(!h.length){ sec.style.display='none'; return; }
  sec.style.display='block';
  list.innerHTML = h.map((item,i)=>`
    <div style="background:#faf7f4;border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px;cursor:pointer" onclick="toggleHistory(${i})">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div style="font-size:12px;font-weight:700;color:var(--red)">${item.date} • ${item.topic}</div>
        <div style="font-size:11px;color:var(--muted)">${item.time}</div>
      </div>
      <div id="hitem_${i}" style="display:none;margin-top:8px;font-size:13px;line-height:1.6;color:var(--dark);white-space:pre-wrap">${item.answer}</div>
    </div>
  `).join('');
}
function toggleHistory(i){
  const el = document.getElementById('hitem_'+i);
  el.style.display = el.style.display==='none' ? 'block' : 'none';
}
function clearHistory(){
  if(confirm('Xóa toàn bộ lịch sử?')){ localStorage.removeItem('lichviet_history'); renderHistory(); }
}

render();
renderHistory();}
  g.appendChild(c);
}

function renderDetail(){
  const p=document.getElementById('detail');
  const{y,m,d}=sel;
  const l=getLunar(y,m,d);
  const dow=DOW[new Date(y,m-1,d).getDay()];
  const sp=getSpecial(l.month,l.day);
  const cc=canChi(l.year);
  const lunarStr=lunarDayStr(l.day)+' tháng '+l.month+(l.isLeap?' (nhuận)':'');
  const ngayCC=CAN[(y*10+m+d)%10]+' '+CHI[(y*10+m+d)%12]; // simplified
  p.innerHTML=`
    <div class="detail-header">${dow}, ${d}/${m}/${y}</div>
    ${sp?`<div class="special-banner">${sp}</div>`:''}
    <div class="detail-grid">
      <div class="detail-item">
        <div class="detail-label">Âm lịch</div>
        <div class="detail-value red">${lunarStr}</div>
      </div>
      <div class="detail-item">
        <div class="detail-label">Năm Can Chi</div>
        <div class="detail-value gold">${cc}</div>
      </div>
      <div class="detail-item">
        <div class="detail-label">Tháng âm</div>
        <div class="detail-value">Tháng ${l.month}</div>
      </div>
      <div class="detail-item">
        <div class="detail-label">Ngày âm</div>
        <div class="detail-value">${lunarDayStr(l.day)}</div>
      </div>
    </div>
  `;
}

let selectedOpt='';
function selectOpt(btn,val){
  document.querySelectorAll('.ai-opt-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  selectedOpt=val;
  document.getElementById('aiQuestion').value='';
}
function updateAILabel(){
  const{y,m,d}=sel;
  document.getElementById('aiDateLabel').textContent=`ngày ${d}/${m}/${y}`;
}

async function askAI(){
  const{y,m,d}=sel;
  const l=getLunar(y,m,d);
  const customQ=document.getElementById('aiQuestion').value.trim();
  const topic=customQ||selectedOpt;
  if(!topic){alert('Vui lòng chọn việc cần xem hoặc gõ câu hỏi!');return;}
  const dow=DOW[new Date(y,m-1,d).getDay()];
  const sp=getSpecial(l.month,l.day)||'Không có ngày lễ đặc biệt';
  const cc=canChi(l.year);
  const prompt=`Bạn là thầy phong thủy am hiểu lịch âm dương, tử vi, ngày giờ tốt xấu theo truyền thống Việt Nam.

Thông tin ngày cần xem:
- Dương lịch: ${dow} ngày ${d}/${m}/${y}
- Âm lịch: ${lunarDayStr(l.day)} tháng ${l.month} năm ${cc}${l.isLeap?' (tháng nhuận)':''}
- Ngày lễ: ${sp}

Câu hỏi: Ngày này có tốt để ${topic} không?

H�y tư vấn chi tiết về:
1. Nhận định tổng quát ngày này (tốt/xấu/bình thường)
2. Lý do dựa theo âm lịch, ngũ hành, tháng năm
3. Giờ tốt trong ngày để thực hiện (nếu có)
4. Những lưu ý cần tránh
5. Lời khuyên cụ thể

Trả lời bằng tiếng Việt, thân thiện, dễ hiểu, không quá 300 từ.`;

  document.getElementById('aiBtn').disabled=true;
  document.getElementById('aiLoading').style.display='block';
  document.getElementById('aiResult').style.display='none';

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        messages:[{role:'user',content:prompt}]
      })
    });
    const data=await res.json();
    const text=data.content?.map(i=>i.text||'').join('')||'Không thể lấy kết quả.';
    document.getElementById('aiResult').textContent=text;
    document.getElementById('aiResult').style.display='block';
    saveHistory(`${d}/${m}/${y}`, topic, text);
  }catch(e){
    document.getElementById('aiResult').textContent='Lỗi kết nối. Vui lòng thử lại.';
    document.getElementById('aiResult').style.display='block';
  }finally{
    document.getElementById('aiBtn').disabled=false;
    document.getElementById('aiLoading').style.display='none';
  }
}

function scrollToAI(){
  document.querySelector('.ai-section').scrollIntoView({behavior:'smooth'});
  document.getElementById('nav1').classList.remove('active');
  document.getElementById('nav2').classList.add('active');
}
function changeMonth(d){
  vM+=d;if(vM>12){vM=1;vY++;}if(vM<1){vM=12;vY--;}render();
}
function goToday(){
  vY=today.getFullYear();vM=today.getMonth()+1;
  sel={y:today.getFullYear(),m:today.getMonth()+1,d:today.getDate()};
  document.getElementById('nav1').classList.add('active');
  document.getElementById('nav2').classList.remove('active');
  render();window.scrollTo({top:0,behavior:'smooth'});
}
render();
</script>
